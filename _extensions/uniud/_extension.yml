title: uniud
author: Luca Di Gaspero
version: 0.1.0
description: A Quarto extension for the University of Udine. Based on Grant McDermott's clean quarto template.
quarto-required: ">=1.3.0"
contributes:
  formats:
    revealjs:
      theme: [default, uniud.scss]
      menu:
        side: left
      slide-number: true
      date-format: long
      html-math-method:
        method: mathjax
        url: "https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"
      include-before-body:
        - text: |
            <script src="mathjax-config.js"></script>
      format-resources:
        - mathjax-config.js