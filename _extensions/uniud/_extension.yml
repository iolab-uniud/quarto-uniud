title: uniud
author: Luca Di Gaspero
version: 0.2.1
description: A Quarto extension for the University of Udine.
quarto-required: ">=1.3.0"
contributes:
  formats:
    revealjs:
      theme: [default, uniud.scss]
      menu:
        side: left
      slide-number: true
      date-format: long
      html-math-method:
        method: mathjax
        url: "https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"
      include-before-body:
        - text: |
            <script src="mathjax-config.js"></script>
      format-resources:
        - mathjax-config.js
        - assets/uniud-logo-blue.svg
        - assets/uniud-logo-white.svg
        - assets/uniud-logo-gray.svg 
        - assets/uniud-logo-black.svg         
      filters:
        - section-slides.lua
    typst:
      typst-cli-args: ["--root", "."]
      template-partials:
        - typst-show.typ
      toc: false
      number-sections: false
      papersize: a4
      fontsize: 11pt